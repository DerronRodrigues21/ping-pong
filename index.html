<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="AI Ping Pong — Play against a pre-trained Deep Q-Network AI opponent with selectable difficulty.">
  <title>AI Ping Pong — Deep Q-Network RL</title>
  
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  
  <!-- Main design system and layout -->
  <link rel="stylesheet" href="assets/style.css">
  
  <style>
    /* Overlay and Menu System Styles */
    #canvas-container {
      position: relative;
      width: 100%;
      max-width: 800px;
    }

    #game-overlay {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      background: rgba(10, 12, 18, 0.9); /* Styled to match --bg-primary */
      border-radius: 16px;
      z-index: 10;
      transition: opacity 0.3s ease;
    }

    .menu-card {
      text-align: center;
      padding: 2.5rem;
      background: var(--bg-surface);
      border: 1px solid var(--border-subtle);
      border-radius: 12px;
      box-shadow: 0 10px 50px rgba(0,0,0,0.6);
    }

    .difficulty-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 1rem;
      margin-top: 2rem;
    }

    button {
      padding: 0.8rem 1.2rem;
      font-family: var(--font-sans);
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
    }

    /* Difficulty-specific coloring */
    .btn-easy { background: #81c784; color: #0a0c12; }
    .btn-medium { background: #4fc3f7; color: #0a0c12; }
    .btn-hard { background: #e57373; color: #0a0c12; }
    
    button:hover {
      transform: translateY(-3px);
      filter: brightness(1.15);
      box-shadow: 0 5px 15px rgba(0,0,0,0.3);
    }

    #serve-prompt {
      color: var(--accent);
      font-family: var(--font-mono);
      font-size: 1.4rem;
      font-weight: 500;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      text-align: center;
      animation: blink 1.2s infinite;
      pointer-events: none;
    }

    @keyframes blink {
      0%, 100% { opacity: 1; transform: scale(1); }
      50% { opacity: 0.4; transform: scale(0.98); }
    }

    .hidden { display: none !important; }

    /* In-game HUD Controls */
    #ingame-controls {
      position: absolute;
      top: 15px;
      right: 15px;
      display: flex;
      gap: 10px;
      z-index: 15;
    }

    .btn-ctrl {
      background: rgba(255, 255, 255, 0.08);
      color: var(--text-primary);
      font-size: 0.7rem;
      padding: 6px 12px;
      border: 1px solid var(--border-subtle);
      backdrop-filter: blur(4px);
    }

    .btn-ctrl:hover {
      background: rgba(255, 255, 255, 0.15);
      border-color: var(--text-secondary);
    }
  </style>
</head>
<body>
  <div id="app">
    <header id="header">
      <h1 id="title"><span class="accent">Ping Pong</span></h1>
      <!-- <p id="subtitle">Pre-trained DQN · Inference Only</p> -->
    </header>

    <main id="game-container">
      <!-- Scoreboard Section -->
      <div id="scoreboard">
        <div class="score-cell">
          <span class="score-label">Player</span>
          <span id="score-player" class="score-value">0</span>
        </div>
        <div class="score-divider"></div>
        <div class="score-cell">
          <span class="score-label">AI</span>
          <span id="score-ai" class="score-value">0</span>
        </div>
      </div>

      <div id="canvas-container">
        <!-- HUD Controls: Hidden until game starts -->
        <div id="ingame-controls" class="hidden">
          <button id="btn-pause" class="btn-ctrl">PAUSE</button>
          <button id="btn-exit" class="btn-ctrl">EXIT</button>
        </div>

        <!-- Main Game Viewport -->
        <div id="canvas-wrapper">
          <canvas id="game-canvas"></canvas>
        </div>

        <!-- Dynamic Overlay for Menus and Prompts -->
        <div id="game-overlay">
          <!-- Home Menu: Difficulty Selection -->
          <div id="menu-home" class="menu-card">
            <h2 style="margin-bottom: 0.5rem; letter-spacing: -0.02em;">Ready to Rally?</h2>
            <p style="color: var(--text-secondary); font-size: 0.9rem;">Select your AI opponent difficulty</p>
            <div class="difficulty-grid">
              <button class="btn-easy" onclick="startGame('easy')">Easy</button>
              <button class="btn-medium" onclick="startGame('medium')">Medium</button>
              <button class="btn-hard" onclick="startGame('hard')">Hard</button>
            </div>
          </div>
          
          <!-- Serve Prompt: Manual input required -->
          <div id="serve-prompt" class="hidden">
            Click Screen or Press Space<br>
            <span style="font-size: 0.8rem; opacity: 0.7;">to Serve</span>
          </div>
        </div>
      </div>

      <!-- System Status Bar -->
      <div id="status-bar">
        <span id="fps-counter">0 FPS</span>
        <span id="game-status">Initializing…</span>
      </div>
    </main>

    <!-- <footer id="footer">
      <p>Built with Canvas &amp; TensorFlow.js</p>
    </footer> -->
  </div>

  <!-- TensorFlow.js Library: Required for DQN inference -->
  <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@4.22.0/dist/tf.min.js"></script>

  <!-- Modular Game Engine: Orchestrates logic and physics -->
  <script type="module" src="app/engine.js"></script>
</body>
</html>
