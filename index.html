<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="AI Ping Pong — Play against a pre-trained Deep Q-Network AI opponent, powered by TensorFlow.js inference.">
  <title>AI Ping Pong — Deep Q-Network RL</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="assets/style.css">
</head>
<body>
  <div id="app">
    <header id="header">
      <h1 id="title">AI <span class="accent">Ping Pong</span></h1>
      <p id="subtitle">Pre-trained DQN · Inference Only</p>
    </header>

    <main id="game-container">
      <div id="scoreboard">
        <div class="score-cell">
          <span class="score-label">Player</span>
          <span id="score-player" class="score-value">0</span>
        </div>
        <div class="score-divider"></div>
        <div class="score-cell">
          <span class="score-label">AI</span>
          <span id="score-ai" class="score-value">0</span>
        </div>
      </div>

      <div id="canvas-wrapper">
        <canvas id="game-canvas"></canvas>
      </div>

      <div id="status-bar">
        <span id="fps-counter">60 FPS</span>
        <span id="game-status">Loading…</span>
      </div>
    </main>

    <footer id="footer">
      <p>Built with Canvas &amp; TensorFlow.js</p>
    </footer>
  </div>

  <!-- TensorFlow.js — inference-only runtime (no training APIs needed) -->
  <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@4.22.0/dist/tf.min.js"></script>

  <script type="module" src="app/engine.js"></script>
</body>
</html>
